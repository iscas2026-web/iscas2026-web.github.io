<!DOCTYPE html>
<html lang="en">

<head>
  <title>IEEE ISCAS 2026 | Sponsor List</title>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <meta name="description" content="IEEE International Symposium on Circuits and Systems (ISCAS) 2026 held in Shanghai, China. ">
  <meta name="keywords" content="ISCAS 2026, IEEE, ISCAS, 2026, Shanghai, China, IEEE International Symposium on Circuits and Systems">

  <!-- Favicons -->
  <link href="../assets/img/favicon.jpg" rel="icon">
  <link href="../assets/img/favicon.jpg" rel="apple-touch-icon">

  <!-- Vendor CSS Files -->
  <link href="../bootstrap.min.css" rel="stylesheet">
  <link href="../bootstrap-icons.css" rel="stylesheet">

  <!-- Template Main CSS File -->
  <link href="sponsor-style.min.css" rel="stylesheet">
  <link href="../style.min.css?v=1716692116" rel="stylesheet">

  <!-- Hero css -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    .sponsor-section {
      padding: 60px 0;
    }
    .sponsor-tier-title {
      font-size: 2rem;
      font-weight: 700;
      color: #0d6efd; /* Bootstrap primary color or custom color */
      margin-bottom: 40px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
    }
    .sponsor-tier-title::after {
      content: '';
      width: 60px;
      height: 3px;
      background: #0d6efd;
      display: block;
      margin: 15px auto 0;
    }
    
    .sponsor-logos {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 28px;
    }

    .sponsor-logo-item {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 260px;
      min-height: 170px;
      padding: 24px;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .sponsor-logo-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .sponsor-logo-item img {
      max-width: 100%;
      max-height: 120px;
      width: auto;
      object-fit: contain;
    }

    /* Tier-specific colors/styles optionally */
    .diamond-tier .sponsor-tier-title { color: #57486a; } /* Example custom color */
    .diamond-tier .sponsor-tier-title::after { background: #57486a; }

    .platinum-tier .sponsor-tier-title { color: #6c757d; }
    .platinum-tier .sponsor-tier-title::after { background: #6c757d; }

    .gold-tier .sponsor-tier-title { color: #d4af37; }
    .gold-tier .sponsor-tier-title::after { background: #d4af37; }

    @media (max-width: 768px) {
      .sponsor-logo-item {
        min-width: 100%;
      }
    }
  </style>

</head>
<body>
  <!-- ======= Header ======= -->
  <header id="header"></header>
  <nav id="navbar"></nav>
  <main id="main">
 
  <script>
      // Function to load header content
      async function loadHeader() {
          try {
              const response = await fetch('../include/header_1.html');
              if (!response.ok) {
                  throw new Error(`HTTP error! status: ${response.status}`);
              }
              const data = await response.text();
              document.getElementById('header').innerHTML = data;

              // Load navbar after header is loaded
              const navResponse = await fetch('../include/menu_1.html');
              if (!navResponse.ok) {
                  throw new Error(`HTTP error! status: ${navResponse.status}`);
              }
              const navData = await navResponse.text();
              document.getElementById('navbar').innerHTML = navData;
          } catch (error) {
              console.error('Error loading header/navbar:', error);
          }
      }

      // Load header when DOM is ready
      document.addEventListener('DOMContentLoaded', loadHeader);
      
      // Make loadHeader available globally for mobile menu
      window.loadHeader = loadHeader;
  </script>

    <!-- ======= Breadcrumbs ======= -->
    <section id="breadcrumbs" class="breadcrumbs">
      <div class="container">
        <ol>
          <li><a href="../">Home</a></li>
          <li><a href="index.html">Sponsors</a></li>
          <li>Sponsor List</li>
        </ol>
        <h2>Sponsor List</h2>
      </div>
    </section>

    <!-- Platinum Elite Package -->
    <section class="sponsor-section platinum-tier bg-light">
      <div class="container">
        <h2 class="sponsor-tier-title">Platinum Elite Sponsors</h2>

        <div class="sponsor-logos">
          <a href="#" class="sponsor-logo-item" target="_blank" aria-label="东方算芯 website">
            <img src="../assets/img/sponsor/sponsor/东方算芯.png" alt="东方算芯">
          </a>
        </div>

      </div>
    </section>

    <!-- Gold Premium Package -->
    <section class="sponsor-section gold-tier">
      <div class="container">
        <h2 class="sponsor-tier-title">Gold Premium Sponsors</h2>

        <div class="sponsor-logos">
          <a href="https://www.giga-da.com/" class="sponsor-logo-item" target="_blank" aria-label="鸿芯微纳 website">
            <img src="../assets/img/sponsor/sponsor/鸿芯微纳.png" alt="鸿芯微纳">
          </a>
        </div>

      </div>
    </section>

    <!-- Basic Professional Package -->
    <section class="sponsor-section basic-tier bg-light">
      <div class="container">
        <h2 class="sponsor-tier-title">Basic Professional Sponsors</h2>
        
        <div class="sponsor-logos">
          <a href="http://www.physyn.com.cn/" class="sponsor-logo-item" target="_blank" aria-label="复芯智感 website">
            <img src="../assets/img/sponsor/sponsor/复芯智感.jpg" alt="复芯智感">
          </a>
          <a href="https://www.springernature.com/gp" class="sponsor-logo-item" target="_blank" aria-label="Springer Nature website">
            <img src="../assets/img/sponsor/springer-nature.jpg" alt="Springer Nature">
          </a>
        </div>

      </div>
    </section>

  </main><!-- End #main -->

  <!-- ======= Footer ======= -->
  <footer id="footer"></footer><!-- End Footer -->

  <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>

  <script>
      // Function to load header and footer content
      async function loadComponents() {
          try {
              // Load header
              const headerResponse = await fetch('../include/header_1.html');
              if (!headerResponse.ok) {
                  throw new Error(`HTTP error! status: ${headerResponse.status}`);
              }
              const headerData = await headerResponse.text();
              document.getElementById('header').innerHTML = headerData;

              // Load navbar
              const navResponse = await fetch('../include/menu_1.html');
              if (!navResponse.ok) {
                  throw new Error(`HTTP error! status: ${navResponse.status}`);
              }
              const navData = await navResponse.text();
              document.getElementById('navbar').innerHTML = navData;

              // Load footer
              const footerResponse = await fetch('../include/footer_1.html');
              if (!footerResponse.ok) {
                  throw new Error(`HTTP error! status: ${footerResponse.status}`);
              }
              const footerData = await footerResponse.text();
              document.getElementById('footer').innerHTML = footerData;
          } catch (error) {
              console.error('Error loading components:', error);
          }
      }

      // Load components when DOM is ready
      document.addEventListener('DOMContentLoaded', loadComponents);
  </script>

  <!-- JS File -->
  <script src="index.js"></script>
</body>
</html>
